<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Initial Data</title>
    <link rel="stylesheet" href="./assets/css/index.css" />
  </head>
  <body>
    <div id="app">
      <div class="products">
        <table id="table-add">
          <thead id="head-label">
            <tr id="label-row">
              <td class="label label-Name">Name</td>
              <td class="label label-Caterogy">Category</td>
              <td class="label label-Price">Price</td>
              <td class="label label-Quantity">Quantity</td>
            </tr>
          </thead>
          <tbody>
            <tr id="input-row">
              <td><input type="text" name="" id="" /></td>
              <td><input type="text" name="" id="" /></td>
              <td><input type="text" name="" id="" /></td>
              <td><input type="text" name="" id="" /></td>
              <td>
                <button
                  style="
                    margin-left: 12px;
                    padding: 2px 8px;
                    background-color: cornflowerblue;
                  "
                >
                  Add
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        <table id="product-table">
          <div class="products__search">
            <input type="text" placeholder="Type to search" id="search-input" />
            <select name="" id="option-input"></select>
          </div>
          <thead id="product-head">
            <tr>
              <th>ID</th>
              <th>Tên sản phẩm</th>
              <th>Danh mục</th>
              <th>Giá (VNĐ)</th>
              <th>Tồn kho</th>
              <th>SL</th>
            </tr>
          </thead>
          <tbody id="product-body"></tbody>
          <tfoot id="product-foot"></tfoot>
        </table>
      </div>
    </div>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
